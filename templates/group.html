<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ group.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page group-page">
        <div class="chat-box">
            <h1 class="chat-title">{{ group.name }}</h1>

            <div class="messages-area">
                {% if group.messages %}
                    {% for msg in group.messages %}
                        <div class="message-line">{{ msg }}</div>
                    {% endfor %}
                {% else %}
                    <div class="message-line empty-message">No messages yet.</div>
                {% endif %}
            </div>

            <form method="POST" action="{{ url_for('send_message', group_id=group.id) }}" class="message-form">
                <input type="text" name="message" placeholder="Type a message..." required>
                <button type="submit" class="btn">Send</button>
            </form>

            <div class="group-actions">
                <a href="{{ url_for('home') }}" class="back-link">Back</a>

                {% if group.owner == "You" %}
                    <form method="POST" action="{{ url_for('delete_group', group_id=group.id) }}">
                        <button type="submit" class="delete-btn">Delete Group</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
